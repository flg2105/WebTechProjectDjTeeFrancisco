spring:
  application:
    name: project-pulse-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/project_pulse}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  sql:
    init:
      mode: always

server:
  port: ${PORT:8080}

app:
  frontend:
    origin: ${FRONTEND_ORIGIN:http://localhost:5173}
