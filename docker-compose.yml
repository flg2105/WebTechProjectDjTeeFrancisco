services:
  mysql:
    image: mysql:8.4
    container_name: project-pulse-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: project_pulse
      MYSQL_USER: projectpulse
      MYSQL_PASSWORD: projectpulse
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:

